<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>Creator Portal | Everlastings by Emaline</title>
<link rel="stylesheet" href="portal.css">
<style>
/* ===================== Account surface ===================== */
.acct{max-width:460px; display:flex; flex-direction:column; gap:14px;}
.acard{background:var(--surface); border:1px solid color-mix(in oklch,var(--hairline),var(--surface) 35%); border-radius:var(--r-lg); box-shadow:var(--sh-1); padding:18px;}
.acard__h{display:flex; align-items:center; gap:13px;}
.avatar-lg{width:48px; height:48px; flex:none; border-radius:var(--r-md); overflow:hidden; display:flex; align-items:center; justify-content:center; background:var(--surface-sunk); border:1px solid var(--hairline);}
.avatar-lg svg{width:100%; height:100%; display:block; padding:6px; box-sizing:border-box;}
.acard__h .who{flex:1; min-width:0; display:flex; flex-direction:column; gap:3px;}
.acard__h .who .lbl{font-size:var(--t-xs); color:var(--ink-faint); text-transform:uppercase; letter-spacing:.06em; font-weight:600;}
.acard__h .who .em{font-size:var(--t-base); font-weight:600; word-break:break-all;}
.acard__actions{margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;}

.linkrow{display:flex; align-items:center; gap:13px; text-decoration:none; color:inherit;}
.linkrow__icon{width:42px; height:42px; flex:none; border-radius:var(--r-md); display:flex; align-items:center; justify-content:center; background:var(--surface-sunk); color:var(--accent-strong);}
.linkrow__icon svg{width:20px; height:20px;}
.linkrow__txt{flex:1;} .linkrow__txt b{display:block; font-size:var(--t-base); font-weight:600;} .linkrow__txt span{font-size:var(--t-sm); color:var(--ink-muted);}
.linkrow__chev{color:var(--ink-faint);}

.envcard{display:flex; align-items:center; gap:12px;}
.env-dot{width:10px; height:10px; border-radius:50%; flex:none;}
.env-dot.test{background:var(--waiting); box-shadow:0 0 6px color-mix(in oklch,var(--waiting),transparent 40%);}
.env-dot.live{background:var(--live); box-shadow:0 0 6px color-mix(in oklch,var(--live),transparent 40%);}
.kv{font-size:var(--t-xs); color:var(--ink-muted); font-family:var(--font-data); margin-top:3px; word-break:break-all;}

/* activity log */
.logcard__cap{display:flex; align-items:center; gap:8px; font-size:var(--t-xs); font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:12px;}
.logcard__cap svg{width:16px; height:16px;}
.logcard__hint{margin-left:auto; font-weight:600; letter-spacing:.02em; text-transform:none; color:var(--ink-faint);}
.loglist{list-style:none; margin:0; padding:0; display:flex; flex-direction:column;}
.logitem{display:flex; gap:11px; padding:9px 0; border-top:1px solid color-mix(in oklch,var(--hairline),var(--surface) 45%);}
.logitem:first-child{border-top:none;}
.logitem__dot{flex:none; width:8px; height:8px; margin-top:6px; border-radius:50%; background:var(--accent);}
.logitem__dot--product{background:var(--live);} .logitem__dot--sale{background:var(--sold);}
.logitem__dot--order{background:var(--waiting);}
.logitem__body{display:flex; flex-direction:column; gap:2px; min-width:0;}
.logitem__summary{font-size:var(--t-sm); color:var(--ink);}
.logitem__meta{font-size:var(--t-xs); color:var(--ink-faint); font-family:var(--font-data);}
.logempty{font-size:var(--t-sm); color:var(--ink-faint); padding:6px 0;}

/* ===== signed-out: full-viewport login ===== */
body.signed-out .rail,body.signed-out .tabbar,body.signed-out .envstrip,body.signed-out .topbar{display:none !important;}
body.signed-out .app{display:block;}
body.signed-out .app__main{padding:0; max-width:none; margin:0;}
body.signed-out #view{margin:0;}
.signin{max-width:380px; margin:6vh auto 0; display:flex; flex-direction:column; gap:16px;}
.signin h2{margin:0; font-size:var(--t-xl); font-weight:600; letter-spacing:-.01em;}
.signin p{margin:0; color:var(--ink-muted); font-size:var(--t-sm);}
.signin .field{gap:7px;}
.signin-fx{position:fixed; inset:0; z-index:40; min-height:100dvh; display:flex; align-items:center; justify-content:center; overflow:hidden; background:var(--bg);}
#fx{position:absolute; inset:0; width:100%; height:100%; z-index:0; touch-action:none;}
.signin-fx .signin{position:relative; z-index:1; margin:0; width:min(380px,90%); background:color-mix(in oklch,var(--surface),transparent 26%); backdrop-filter:blur(10px) saturate(1.3); -webkit-backdrop-filter:blur(10px) saturate(1.3); padding:26px; border-radius:var(--r-lg); box-shadow:var(--sh-2); border:1px solid color-mix(in oklch,var(--surface),transparent 50%);}
/* glass fields: clear at rest, prominent blur on focus for easy typing */
.signin-fx .signin .input{background:color-mix(in oklch,var(--surface),transparent 72%); border-color:color-mix(in oklch,var(--hairline),transparent 30%); transition:background .15s, backdrop-filter .15s;}
.signin-fx .signin .input:focus{background:color-mix(in oklch,var(--surface),transparent 8%); backdrop-filter:blur(16px) saturate(1.4); -webkit-backdrop-filter:blur(16px) saturate(1.4);}
.signin-fx .signin .btn--block{background:color-mix(in oklch,var(--accent),transparent 12%); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);}
/* floating home button — in front of the animation, accent-tinted, label revealed on hover/tap */
.fx-home{position:absolute; z-index:2; left:20px; bottom:20px; display:inline-flex; align-items:center; gap:8px; padding:10px; border-radius:var(--r-pill); color:#fff; background:color-mix(in oklch,var(--accent),transparent 22%); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); text-decoration:none; box-shadow:var(--sh-1); transition:background .15s;}
.fx-home svg{width:20px; height:20px; flex:none;}
.fx-home__lbl{max-width:0; overflow:hidden; white-space:nowrap; font-size:var(--t-sm); font-weight:600; opacity:0; transition:max-width .22s var(--ease-weight), opacity .18s, padding-right .22s;}
.fx-home:hover,.fx-home:focus-visible{background:color-mix(in oklch,var(--accent),transparent 6%);}
.fx-home:hover .fx-home__lbl,.fx-home:focus-visible .fx-home__lbl,.fx-home:active .fx-home__lbl{max-width:120px; opacity:1; padding-right:4px;}
@media (max-width:560px){.fx-home{left:14px; bottom:14px;}}
</style>
</head>
<body>
<div class="app">
  <main class="app__main" id="main">
    <header class="topbar"><h1>Account</h1><span class="test-chip" id="envChip">Test</span></header>
    <div id="view"></div>
  </main>
</div>
<script src="data.js"></script>
<script src="portal.js"></script>
<script src="account-app.js"></script>
</body>
</html>
