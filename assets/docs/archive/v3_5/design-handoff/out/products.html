<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>Creator Portal | Everlastings by Emaline</title>
<link rel="stylesheet" href="portal.css">
<style>
/* ===================== Products surface — page-scoped layout ===================== */

/* tools: tabs + search live INSIDE the surface */
.tools{display:flex; flex-direction:column; gap:10px; margin-bottom:14px;}
.tools__line{display:flex; gap:10px; align-items:center;}
.tools__line .searchbar{flex:1;}
@media (min-width:860px){
  .tools__line .searchbar{flex:0 1 50%;}
  .tools__line .btn-new{margin-left:auto;}
}

/* segmented tabs — Sold blinks faint orange when unseen orders wait (cross-surface signal) */
.seg__chip[data-alert]{position:relative;}
.seg__chip[data-alert]::after{content:""; position:absolute; inset:3px 6px; border-radius:var(--r-pill); z-index:-1;
  background:var(--waiting); opacity:0; animation:tab-alert 2.4s var(--ease-weight) infinite;}

/* +New button — clean, no underline */
.btn-new{text-decoration:none;}
.btn-new:hover{text-decoration:none;}

/* ---------- the spreadsheet (softer / more blended, per controls.html) ---------- */
.list{display:flex; flex-direction:column; gap:9px;}

.prow{
  position:relative; display:grid; align-items:center;
  grid-template-columns:auto 42px 1fr auto;
  gap:11px; padding:11px 13px;
  background:var(--surface); border:1px solid color-mix(in oklch,var(--hairline),var(--surface) 35%);
  border-radius:var(--r-lg); box-shadow:var(--sh-1);
  transition:box-shadow var(--dur-base) var(--ease-weight), border-color var(--dur-base) var(--ease-weight);
}
.prow:hover{box-shadow:var(--sh-2);}
.prow.is-open{border-color:var(--accent); box-shadow:var(--sh-2); position:sticky; top:0; z-index:12;}
.prow__led{display:flex; align-items:center; justify-content:center; width:13px;}
.prow__thumb{width:42px; height:42px; border-radius:var(--r-sm); flex:none; overflow:hidden;
  background:var(--surface-sunk); border:1px solid var(--hairline); position:relative;}
.prow__thumb img{width:100%; height:100%; object-fit:cover; display:block;}
.prow__thumb .ph{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--ink-faint);}
.prow__thumb .ph svg{width:17px; height:17px;}
.prow__id{min-width:0; cursor:pointer; display:flex; flex-direction:column; gap:1px; text-align:left; background:none; border:0; padding:0; font-family:inherit;}
.prow__title{font-size:var(--t-sm); font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.prow__meta{font-size:var(--t-xs); color:var(--ink-faint); display:flex; gap:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.prow__meta .slug{font-family:var(--font-data);}

/* mobile compact price (qty stacked under, like slug under title) + control strip */
.prow__price{display:flex; flex-direction:column; align-items:flex-end; gap:1px; font-family:var(--font-data); font-variant-numeric:tabular-nums; font-size:var(--t-sm); font-weight:600; color:var(--ink); justify-self:end; white-space:nowrap;}
.prow__price .qtysub{font-size:var(--t-xs); font-weight:500; color:var(--ink-faint);}
.prow__price .qtysub.zero{color:var(--sold); font-weight:600;}
.prow__ctrls{grid-column:1 / -1; display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding-top:10px; margin-top:3px; border-top:1px solid var(--hairline);}
.prow__ctrls .switch__label{font-size:var(--t-xs); font-weight:600;}
.prow__ctrls .spacer{flex:1;}
.prow__cols{display:none;}
.listhead{display:none;}

@media (min-width:860px){
  .listhead{display:grid; grid-template-columns:13px 42px minmax(150px,1.6fr) 104px 48px 60px 60px 70px;
    gap:12px; align-items:center; padding:4px 14px 2px; color:var(--ink-faint);
    font-size:var(--t-xs); font-weight:700; letter-spacing:.05em; text-transform:uppercase;}
  .listhead .r{text-align:right;} .listhead .c{text-align:center;}
  .prow{grid-template-columns:13px 42px minmax(150px,1.6fr) 104px 48px 60px 60px 70px; gap:12px; padding:9px 14px;}
  .prow__price, .prow__ctrls{display:none;}
  .prow__cols{display:contents;}
  .cell-price{position:relative;}
  .cell-price .pin{width:100%; min-height:36px; padding:7px 9px 7px 19px; border-radius:var(--r-sm);
    background:var(--surface-sunk); border:1.5px solid var(--hairline); box-shadow:var(--sh-inset);
    font-family:var(--font-data); font-variant-numeric:tabular-nums; font-size:var(--t-sm); color:var(--ink); text-align:right;
    transition:border-color var(--dur-base) var(--ease-weight), box-shadow var(--dur-base) var(--ease-weight), background-color var(--dur-base) var(--ease-weight);}
  .cell-price .sym{position:absolute; left:8px; top:50%; transform:translateY(-50%); color:var(--ink-faint); font-family:var(--font-data); font-size:var(--t-sm); pointer-events:none;}
  .cell-price .pin:hover{border-color:var(--ink-faint);}
  .cell-price .pin:focus{outline:none; background:var(--surface); border-color:var(--live); box-shadow:0 0 0 3px color-mix(in oklch,var(--live),transparent 74%);}
  .cell-qty{position:relative;}
  .cell-qty .qin{width:100%; min-height:36px; padding:7px 8px; border-radius:var(--r-sm);
    background:var(--surface-sunk); border:1.5px solid var(--hairline); box-shadow:var(--sh-inset);
    font-family:var(--font-data); font-variant-numeric:tabular-nums; font-size:var(--t-sm); color:var(--ink); text-align:right;
    transition:border-color var(--dur-base) var(--ease-weight), box-shadow var(--dur-base) var(--ease-weight), background-color var(--dur-base) var(--ease-weight);}
  .cell-qty .qin:hover{border-color:var(--ink-faint);}
  .cell-qty .qin:focus{outline:none; background:var(--surface); border-color:var(--live); box-shadow:0 0 0 3px color-mix(in oklch,var(--live),transparent 74%);}
  .cell-qty .qin.zero{color:var(--sold); font-weight:700;}
  .cell-toggle{display:flex; justify-content:center;}
  .cell-actions{display:flex; justify-content:flex-end; gap:1px;}
}

/* ---------- expanded editor: desktop accordion ---------- */
.editor-host{display:none;}
.prow.is-open + .editor-host{display:block;}
@media (min-width:860px){
  .prow.is-open{border-bottom-color:transparent; border-radius:var(--r-lg) var(--r-lg) 0 0;}
  .editor-host{margin:-9px 0 0; border:1px solid var(--accent); border-top:none;
    border-radius:0 0 var(--r-lg) var(--r-lg); background:var(--surface); box-shadow:var(--sh-2);
    animation:expand var(--dur-settle) var(--ease-weight);}
}
@keyframes expand{from{opacity:0; transform:translateY(-6px);}to{opacity:1; transform:none;}}

/* mobile full-screen sheet */
.sheet{position:fixed; inset:0; z-index:55; background:var(--bg); display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform var(--dur-settle) var(--ease-weight); visibility:hidden;}
.sheet.is-on{transform:none; visibility:visible;}
.sheet__body{flex:1; overflow:auto; -webkit-overflow-scrolling:touch;}
@media (min-width:860px){.sheet{display:none!important;}}

/* the sticky control bar = the row, reused at the top of the mobile editor */
.edbar{position:sticky; top:0; z-index:6; display:flex; align-items:center; gap:12px;
  padding:calc(9px + env(safe-area-inset-top)) 12px 9px; background:var(--surface);
  border-bottom:1px solid var(--hairline);}
.edbar__spacer{flex:1;}
.edbar__toggles{display:flex; align-items:center; gap:16px;}
.edbar .switch__label{font-size:var(--t-xs); font-weight:600;}

.ed-body{padding:16px 14px 20px;}
@media (min-width:860px){.ed-body{padding:18px 20px 22px;}}

.section-h{display:flex; align-items:center; gap:10px; margin:20px 0 11px; font-size:var(--t-xs); font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--ink-muted);}
.section-h:first-child{margin-top:4px;}
.section-h .line{flex:1; height:1px; background:var(--hairline);}
.section-h .note{text-transform:none; letter-spacing:0; font-weight:500; color:var(--ink-faint);}

/* commerce price+quantity — on DESKTOP these live in the sticky row bar, so hide here; shown on mobile only */
.commerce{background:color-mix(in oklch,var(--live-bg),var(--surface) 46%); border:1px solid var(--live-bd);
  border-radius:var(--r-md); padding:13px; margin-bottom:6px; display:grid; grid-template-columns:1fr 1fr; gap:13px;}
.commerce .field{margin:0;}
@media (min-width:860px){.commerce{display:none;}}

/* editor layout: main editorial column + compact identity/SEO side card */
.ed-cols{display:flex; flex-direction:column; gap:18px;}
.ed-main{display:flex; flex-direction:column; gap:16px;}
.ed-grid{display:grid; grid-template-columns:1fr; gap:16px;}
.ed-card{background:var(--surface-sunk); border:1px solid var(--hairline); border-radius:var(--r-md); padding:14px;}
.ed-card__cap{display:flex; align-items:center; gap:7px; font-size:var(--t-xs); font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:12px;}
.ed-card .ed-grid{gap:16px;}

@media (min-width:760px){
  .ed-grid--2{grid-template-columns:1fr 1fr;}
  .ed-grid--3{grid-template-columns:1fr 1fr 1fr;}
  .ed-span2{grid-column:1 / -1;}
}
@media (min-width:1024px){
  .ed-cols{flex-direction:row; align-items:flex-start;}
  .ed-main{flex:1; min-width:0;}
  .ed-side{width:420px; flex:none; position:sticky; top:64px;}
}

/* dimensions trio — placeholder-labeled inputs (Width / Depth / Height) */
.dims{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
.dims .input{text-align:left;}
.dimcell{position:relative; display:block;}
.dimcell .input{width:100%; padding-right:30px;}
.dimunit{position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:11px; font-weight:700; letter-spacing:.02em; color:var(--ink-faint); pointer-events:none; opacity:0; transition:opacity .12s var(--ease-weight);}
.dimcell .input:not(:placeholder-shown) + .dimunit{opacity:1;}

/* ===== media center ===== */
.media-center{display:flex; flex-direction:column; gap:12px;}
.media-cover{display:grid; grid-template-columns:132px 1fr; gap:12px;}
@media (max-width:560px){.media-cover{grid-template-columns:1fr;}}
.mtile{position:relative; border-radius:var(--r-md); overflow:hidden; background:var(--surface-sunk); border:1.5px solid var(--hairline);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:var(--ink-faint); cursor:pointer; min-height:96px; text-align:center;
  transition:border-color var(--dur-base) var(--ease-weight), color var(--dur-base) var(--ease-weight);}
.mtile:hover{border-color:var(--accent); color:var(--accent);}
.mtile.filled{border-style:solid; border-color:var(--live-bd);}
.mtile.filled > img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
.mtile.missing{border-color:var(--danger-bd); color:color-mix(in oklch,var(--danger),black 6%);}
.mtile > svg{width:20px; height:20px;}
.mtile--hero{min-height:132px;}
.mtile__label{position:relative; z-index:1; font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;}
.mtile__sub{display:block; font-weight:500; font-size:9px; letter-spacing:0; text-transform:none; opacity:.85;}
.mtile.filled .mtile__label{position:absolute; bottom:0; left:0; right:0; padding:14px 6px 3px; text-align:left;
  background:linear-gradient(transparent, oklch(24% 0.03 262 /.6)); color:#fff;}
.mtile__badge{position:absolute; top:5px; left:5px; z-index:2; min-width:18px; height:18px; padding:0 3px; border-radius:9px;
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff; background:color-mix(in oklch,var(--live),black 14%);}
.mtile__badge.warn{background:color-mix(in oklch,var(--danger),black 6%);}
.mtile__open{position:absolute; top:5px; right:5px; z-index:2; width:22px; height:22px; border-radius:6px;
  background:color-mix(in oklch,var(--ink),transparent 22%); color:#fff; display:flex; align-items:center; justify-content:center;}
.mtile__open svg{width:12px; height:12px;}
.mgallery{border-radius:var(--r-md); border:1.5px solid var(--hairline); background:var(--surface-sunk); padding:10px; cursor:pointer; display:flex; flex-direction:column; gap:8px;}
.mgallery:hover{border-color:var(--accent);}
.mgallery.filled{border-color:var(--live-bd);}
.mgallery__head{display:flex; align-items:center; justify-content:space-between; font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-muted);}
.mgallery__count{font-family:var(--font-data);}
.mgallery__hint{font-weight:600; letter-spacing:.02em; text-transform:none; color:var(--ink-faint);}
.gthumb{cursor:pointer;}
.gthumb.dragging{cursor:grabbing;}
.mgallery__count.ok{color:color-mix(in oklch,var(--live),black 18%);}
.mgallery__count.warn{color:color-mix(in oklch,var(--waiting),black 22%);}
.mgallery__strip{display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;}
.mgallery__strip::-webkit-scrollbar{display:none;}
.mgallery__strip img{width:56px; height:56px; flex:none; border-radius:var(--r-sm); object-fit:cover; border:1px solid var(--hairline);}
.mgallery__empty{display:flex; align-items:center; gap:7px; color:var(--ink-faint); font-size:var(--t-sm); min-height:56px;}
.mgallery__empty svg{width:18px; height:18px;}
.media-secondary{display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:10px;}
@media (max-width:560px){.media-secondary{grid-template-columns:1fr 1fr;}}
.media-secondary .mtile{min-height:76px;}
.media-add{display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:0 18px; min-height:76px;
  border:1.5px solid var(--accent); color:var(--accent); border-radius:var(--r-md); cursor:pointer; font-weight:600; font-size:var(--t-sm); background:var(--accent-soft); white-space:nowrap;}
.media-add:hover{background:color-mix(in oklch,var(--accent-soft),var(--accent) 12%);}
.media-add svg{width:18px; height:18px;}
@media (max-width:560px){.media-add{grid-column:1 / -1; min-height:48px;}}

/* bottom action bar — Archive (left) | Save · Preview · Publish (right) */
.editor{display:flex; flex-direction:column;}
.ed-actions{position:sticky; bottom:0; z-index:6; display:flex; align-items:center; gap:9px; flex-wrap:wrap;
  padding:12px 14px calc(12px + env(safe-area-inset-bottom)); background:var(--surface);
  border-top:1px solid var(--hairline);}
@media (min-width:860px){.ed-actions{padding:13px 20px; border-radius:0 0 var(--r-lg) var(--r-lg);}}
@media (max-width:859px){
  .ed-actions{order:-1; position:static; bottom:auto; border-top:none; border-bottom:1px solid var(--hairline);
    padding:10px 14px; justify-content:flex-end;}
  .ed-actions .grow{display:none;}
  .ed-actions__why{order:0; flex-basis:100%; text-align:right; margin-top:0;}
}
.ed-actions .grow{flex:1;}
.ed-actions__why{flex-basis:100%; order:9; margin-top:-2px;}
.btn--archive{background:transparent; color:color-mix(in oklch,var(--danger),black 8%); border-color:var(--danger-bd);}
.btn--archive:hover{background:var(--danger-bg); border-color:var(--danger); transform:none; box-shadow:var(--sh-1);}
.btn--publish-new{background:transparent; color:color-mix(in oklch,var(--live),black 16%); border:1.5px solid var(--live);}
.btn--publish-new:hover{background:var(--live-bg);}
.btn--publish-edits{background:var(--waiting); color:#fff;}
.btn--publish-edits:hover{background:color-mix(in oklch,var(--waiting),black 12%);}

/* list fields: plain one-per-line textarea (auto-bullet-in-field removed — was unreliable) */
.bullets-ta{line-height:1.5;}

/* ===== media modal ===== */
.modal{position:fixed; inset:0; z-index:65; display:none; align-items:flex-end; justify-content:center;}
.modal.is-on{display:flex;}
@media (min-width:760px){.modal{align-items:center;}}
.modal__card{position:relative; z-index:1; width:100%; max-width:680px; max-height:92dvh; overflow:auto; background:var(--surface);
  border-radius:var(--r-lg) var(--r-lg) 0 0; box-shadow:var(--sh-2); display:flex; flex-direction:column;}
@media (min-width:760px){.modal__card{border-radius:var(--r-lg); max-height:88dvh;}}
.modal__head{position:sticky; top:0; z-index:2; display:flex; align-items:center; gap:10px; padding:15px 16px; background:var(--surface); border-bottom:1px solid var(--hairline);}
.modal__head h3{margin:0; font-size:var(--t-lg); font-weight:600; flex:1;}
.modal__body{padding:16px;}
.dropzone{border:2px dashed var(--hairline); border-radius:var(--r-md); background:var(--surface-sunk); padding:26px 18px;
  display:flex; flex-direction:column; align-items:center; gap:9px; text-align:center; transition:border-color var(--dur-base) var(--ease-weight), background-color var(--dur-base) var(--ease-weight);}
.dropzone.drag{border-color:var(--accent); background:var(--accent-soft);}
.dropzone svg{width:30px; height:30px; color:var(--ink-faint);}
.dropzone p{margin:0; font-size:var(--t-sm); color:var(--ink-muted);}
.urlrow{display:flex; gap:8px; margin-top:12px;}
.urlrow .input{flex:1;}
.mitems{display:flex; flex-direction:column; gap:10px; margin-top:16px;}
.mitem{display:flex; gap:11px; padding:11px; border:1px solid var(--hairline); border-radius:var(--r-md); background:var(--surface);}
.mitem__thumb{width:72px; height:72px; flex:none; border-radius:var(--r-sm); overflow:hidden; background:var(--surface-sunk); position:relative; display:flex; align-items:center; justify-content:center;}
.mitem__thumb img,.mitem__thumb video{width:100%; height:100%; object-fit:cover;}
.mitem__thumb .yt{color:var(--danger);} .mitem__thumb svg{width:22px; height:22px; color:var(--ink-faint);}
.mitem__body{flex:1; min-width:0; display:flex; flex-direction:column; gap:7px;}
.mitem__type{font-size:var(--t-xs); font-weight:600; color:var(--ink-muted); display:flex; align-items:center; gap:6px;}
.mitem__type .dot{width:7px; height:7px; border-radius:50%; background:var(--live);}
.mitem .input{min-height:38px; font-size:var(--t-sm);}
.roleboxes{display:flex; flex-wrap:wrap; gap:6px;}
.rolebox{display:inline-flex; align-items:center; gap:5px; font-size:var(--t-xs); font-weight:600; padding:4px 9px; border-radius:var(--r-pill);
  border:1px solid var(--hairline); background:var(--surface-sunk); color:var(--ink-muted); cursor:pointer; user-select:none;}
.rolebox input{position:absolute; opacity:0; width:0; height:0;}
.rolebox.on{background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:var(--sh-1);}
.rolebox.on::before{content:"✓"; font-weight:800;}
.mitem__del{align-self:flex-start;}
/* new-upload highlight: pale-yellow double pulse */
@keyframes mflash{0%,50%{background:oklch(94% 0.08 96);}25%,100%{background:transparent;}}
.mitem.is-new{animation:mflash 2.4s var(--ease-weight) 1; border-radius:var(--r-md);}
/* square secondary tiles in the editor media display */
.media-sq{display:grid; grid-template-columns:repeat(auto-fill,minmax(104px,1fr)); gap:10px; margin-top:10px;}
.msq{position:relative; aspect-ratio:1/1; border-radius:var(--r-md); overflow:hidden; border:1px solid var(--hairline); background:var(--surface-sunk); cursor:pointer;}
.msq img,.msq video{width:100%; height:100%; object-fit:cover; display:block;}
.msq::after{content:""; position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.42),transparent 46%); pointer-events:none;}
.msq__lbl{position:absolute; left:7px; bottom:6px; z-index:1; font-size:9px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.6);}
.msq__play,.msq__yt{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; color:#fff;}
.msq__play svg,.msq__yt svg{width:26px; height:26px; filter:drop-shadow(0 1px 4px rgba(0,0,0,.5));}
.msq .mtile__open{position:absolute; top:6px; right:6px; z-index:2;}
/* editor media display actions row */
.media-actions{display:flex; align-items:center; gap:12px; margin-top:12px; flex-wrap:wrap;}
.media-note{font-size:var(--t-xs); color:var(--ink-faint); max-width:36ch;}
/* gallery drag thumbnails with live numbers */
.gthumb{position:relative; flex:none; cursor:grab; touch-action:none; display:flex; flex-direction:column; align-items:center; gap:4px;}
.gthumb img{width:56px; height:56px; border-radius:var(--r-sm); object-fit:cover; border:1px solid var(--hairline); display:block; pointer-events:none;}
.gthumb__n{font-size:10px; font-weight:700; color:var(--ink-muted); line-height:1;}
.gthumb.dragging{opacity:.55; cursor:grabbing;}
.mgallery__strip{padding-bottom:2px;}
/* schedule-publish popover */
.schedpop{position:fixed; z-index:70; background:var(--surface); border:1px solid var(--hairline); border-radius:var(--r-md); box-shadow:var(--sh-2); padding:14px; width:min(300px,92vw); display:flex; flex-direction:column; gap:10px;}
.schedpop h4{margin:0; font-size:var(--t-sm); font-weight:700;}
.schedpop .row{display:flex; gap:8px;} .schedpop .input{flex:1;}
.sched-chip{display:inline-flex; align-items:center; gap:7px; padding:5px 11px; border-radius:var(--r-pill); background:color-mix(in oklch,var(--staged),white 80%); color:color-mix(in oklch,var(--staged),black 16%); border:1px solid color-mix(in oklch,var(--staged),white 52%); font-size:var(--t-xs); font-weight:600;}
.sched-chip button{background:none; border:none; cursor:pointer; color:inherit; opacity:.7; font-weight:700; padding:0 2px;}
@media (max-width:859px){.mitem .input,#urlInput{font-size:16px;}}
.mprog{height:4px; border-radius:2px; background:var(--surface-sunk); overflow:hidden;}
.mprog i{display:block; height:100%; width:30%; background:var(--accent); animation:load 1.1s var(--ease-weight) infinite;}
@keyframes load{0%{width:8%;}50%{width:78%;}100%{width:97%;}}
.modal__foot{position:sticky; bottom:0; display:flex; align-items:center; gap:10px; padding:13px 16px; background:var(--surface); border-top:1px solid var(--hairline);}
.modal__foot .grow{flex:1;}
.fallback-note{font-size:var(--t-xs); color:var(--ink-muted); display:flex; align-items:center; gap:6px;}
.fallback-note .x{color:var(--danger); font-weight:800;}

/* stock prompt popover */
.stockpop{position:absolute; z-index:40; width:min(282px,86vw); padding:14px; background:var(--surface);
  border:1px solid var(--hairline); border-radius:var(--r-md); box-shadow:var(--sh-2);}
.stockpop h4{margin:0 0 6px; font-size:var(--t-sm);} .stockpop p{margin:0 0 10px; font-size:var(--t-xs); color:var(--ink-muted);}
.stockpop .r{display:flex; gap:8px; align-items:center;} .stockpop .input{min-height:40px;}
</style>
</head>
<body>

<!-- mobile-only full-width env strip -->
<div class="envstrip" id="envStrip">Test</div>

<div class="app">
  <!-- desktop rail (brandless) -->
  <nav class="rail" aria-label="Portal sections">
    <button class="rail__toggle" id="railToggle" aria-label="Collapse menu" title="Collapse menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
    </button>
    <a class="rail__item" href="products.html" aria-current="page" data-label="Products">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span class="lbl">Products</span>
    </a>
    <a class="rail__item" href="orders.html" data-alert data-label="Orders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 7 9-4 9 4-9 4-9-4Z"/><path d="M3 7v10l9 4 9-4V7"/><path d="m12 11v10"/></svg>
      <span class="lbl">Orders</span><span class="badge">2</span>
    </a>
    <a class="rail__item" href="sales.html" data-label="Sales">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 13.4 13.4 20.6a2 2 0 0 1-2.8 0l-7.2-7.2a2 2 0 0 1-.6-1.4V4a1 1 0 0 1 1-1h8a2 2 0 0 1 1.4.6l7.4 7.4a2 2 0 0 1 0 2.4Z"/><circle cx="7.5" cy="7.5" r="1.2"/></svg>
      <span class="lbl">Sales</span>
    </a>
    <a class="rail__item" href="account.html" data-label="Account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>
      <span class="lbl">Account</span>
    </a>
    <span class="rail__sep" aria-hidden="true"></span>
    <a class="rail__item rail__foot" href="https://everlastingsbyemaline.com" target="_blank" rel="noopener" data-label="View Site">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M21 3 10 14"/><path d="M19 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h6"/></svg>
      <span class="lbl">View Site</span>
    </a>
  </nav>

  <main class="app__main">
    <header class="topbar">
      <h1>Products</h1>
      <span class="test-chip" id="envChip">Test</span>
    </header>

    <div class="tools">
      <div class="seg" role="tablist" aria-label="Filter products by state" id="tabs"></div>
      <div class="tools__line">
        <div class="searchbar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input class="input" id="search" type="search" placeholder="Search products by name or slug" autocomplete="off">
        </div>
        <button class="btn btn--sm btn-new" id="newBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          New
        </button>
      </div>
    </div>

    <div class="listhead" aria-hidden="true">
      <span></span><span></span><span>Product</span><span class="r">Price · live</span><span class="r">Qty</span><span class="c">Avail</span><span class="c">Feat</span><span class="r"></span>
    </div>
    <div class="list" id="list"></div>
  </main>
</div>

<!-- mobile bottom nav (mirrors the desktop rail) -->
<nav class="tabbar" aria-label="Portal sections">
  <a class="tabbar__item" href="products.html" aria-current="page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Products
  </a>
  <a class="tabbar__item" href="orders.html" data-alert>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 7 9-4 9 4-9 4-9-4Z"/><path d="M3 7v10l9 4 9-4V7"/></svg>Orders<span class="badge">2</span>
  </a>
  <a class="tabbar__item" href="sales.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 13.4 13.4 20.6a2 2 0 0 1-2.8 0l-7.2-7.2a2 2 0 0 1-.6-1.4V4a1 1 0 0 1 1-1h8a2 2 0 0 1 1.4.6l7.4 7.4a2 2 0 0 1 0 2.4Z"/><circle cx="7.5" cy="7.5" r="1.2"/></svg>Sales
  </a>
  <a class="tabbar__item" href="account.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>Account
  </a>
</nav>

<!-- media modal -->
<div class="modal" id="mediaModal" role="dialog" aria-modal="true" aria-label="Add and edit media">
  <div class="scrim" id="mediaScrim"></div>
  <div class="modal__card">
    <div class="modal__head"><h3>Media</h3><button class="iconbtn" id="mediaClose" aria-label="Close">✕</button></div>
    <div class="modal__body" id="mediaBody"></div>
    <div class="modal__foot">
      <span class="fallback-note" id="mediaFallback"></span>
      <span class="grow"></span>
      <button class="btn" id="mediaApply">Apply</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*,video/mp4" multiple hidden>

<script src="data.js"></script>
<script src="portal.js"></script>
<script src="products-app.js"></script>
</body>
</html>
